<div class="component-container">
  <div class="about-me-container">
    <div class="profile-section">
      <div class="profile-image">
        <img src="assets/howie.jpeg" alt="Profile Picture" />
      </div>
      <h1>About Me</h1>
    </div>

    <div *ngFor="let paragraph of aboutMeText">
      <p>{{ paragraph }}</p>
    </div>

    <h1>Hobbies</h1>
    <div *ngFor="let hobby of hobbies">
      <h2>{{ hobby.name }}</h2>
      <p>{{ hobby.description }}</p>
    </div>
  </div>
</div>
