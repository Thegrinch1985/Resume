<nav>
  <!-- Hamburger Menu Button -->
  <button
    class="hamburger"
    [class.active]="menuOpen"
    (click)="toggleMenu()"
    type="button"
    aria-label="Toggle navigation menu"
    [attr.aria-expanded]="menuOpen"
  >
    ☰
  </button>

  <ul class="nav-menu" [class.open]="menuOpen">
    <li><a routerLink="/resume" routerLinkActive="active" (click)="closeMenu()">Resume</a></li>
    <li><a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About Me</a></li>
    <li><a routerLink="/work" routerLinkActive="active" (click)="closeMenu()">Work Experience</a></li>
    <li><a routerLink="/education" routerLinkActive="active" (click)="closeMenu()">Education</a></li>
    <li><a routerLink="/projects" routerLinkActive="active" (click)="closeMenu()">Projects</a></li>
    <li><a routerLink="/skills" routerLinkActive="active" (click)="closeMenu()">Skills & Tech Stack</a></li>
    <li><a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a></li>
  </ul>

  <button
    class="toggle-button"
    [ngClass]="isLightMode ? 'light-mode' : 'dark-mode'"
    (click)="toggleDarkMode()"
    type="button"
    aria-label="Toggle dark mode"
  >
    <span class="toggle-button-icon" aria-hidden="true">{{ buttonText }}</span>
  </button>

</nav>
