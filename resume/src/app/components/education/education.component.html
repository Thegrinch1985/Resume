<div class="component-container" #scrollRoot>
  <div class="education-container">
    <h1>Education</h1>

    <div class="timeline-layout">
      <div class="timeline-container">
        <div class="timeline">
          <div
            *ngFor="let year of educationData; let i = index"
            class="timeline-item"
            [id]="'education-year-' + i"
            [attr.data-year]="year.year"
          >
            <div class="timeline-card">
              <h2>{{ year.year }}</h2>

              <div *ngFor="let institution of year.institutions">
                <h3>{{ institution.name }}</h3>
                <p class="degree">{{ institution.degree }}</p>
                <p class="gpa">📚 GPA: {{ institution.gpa }}</p>

                <div *ngFor="let semester of institution.semesters">
                  <h4>{{ semester.name }}</h4>
                  <ul>
                    <li *ngFor="let subject of semester.subjects">
                      <strong>{{ subject.name }}:</strong> {{ subject.grade }}
                    </li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <aside class="timeline-year-rail" aria-hidden="true">
        <div class="timeline-year-pill">{{ activeYear }}</div>
      </aside>
    </div>
  </div>
</div>
